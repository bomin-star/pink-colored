<!DOCTYPE html>
<html lang="ko"> 
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>글에 쓰인 분홍의 요소</title>
	<meta name="description" content="글에 쓰인 분홍색의 요소를 모아놓은 웹사이트입니다.">
	<meta name="keywords" content="글, 글자, 1997년, 월간디자인, 잡지, 분홍, 분홍색">
	<link rel="stylesheet" href="style.css">
	<script type="module">
  	import { fairyDustCursor } from "https://unpkg.com/cursor-effects@latest/dist/esm.js";
  	new fairyDustCursor();
 	</script>
</head>
<body class="Letter">
	<h1 class="Title1">글에 쓰인 분홍의 요소</h1>
		<ul>
			<img  class="L1" src="L1.jpeg" alt="흰 바탕에 '코다 신드롬?(소문으로 확인후 결정하세요!)'라는 분홍색 글이 적혀있는 이미지이다.">

			<img class="L2" src="L2.jpeg" alt="흰 바탕에 '실사연출의 선두주자 근도 사인 시스템'이라는 분홍색 글이 적혀있는 이미지이다.">

			<img class="L3" src="L3.jpeg" alt="흰 바탕에 '모두가 깜짝 놀랐습니다!!'라는 분홍색 글이 적혀있는 이미지이다.
			그 밑에 '• 서울산업대 공디과 / 시디과 완전석권 • 도예과/ 응용회화과 높은 합격율'이라는 작은 분홍색 글도 적혀있다.">

			<img class="L4" src="L4.jpeg" alt="노란 바탕에 '크리스탈'이라는 분홍색 글이 적혀있는 이미지이다.">

			<img class="L5" src="L5.jpeg" alt="노란 바탕에 '97 새글꼴'이라는 분홍색 글이 적혀있는 이미지이다.">

			<img class="L6" src="L6.jpeg" alt="보라색 배경에 '신입생모집 (정규, 속성,단과 / 현재접수중)'이라는 분홍색 글이 적혀있는 이미지이다.">

			<img class="L7" src="L7.jpeg" alt="흰 배경에 '현대종합기획이 있습니다.'라는 분홍색 글이 적혀있는 이미지이다.">

			<img class="L8" src="L8.jpeg" alt="흰 배경에 '21세기 플렉스 원단! K-FLEX 2000 탄생'이라는 분홍색 글이 적혀있는 이미지이다.">
		</ul>
		<p class="title3">글, 배경, 그림이 함께 사용된 광고 속 분홍은 특정 요소를 강조하기 위한 색을 넘어 광고 전체의 분위기와 정체성을 형성하는 중심 색채로 사용되고 있다. 분홍은 글자를 강조하고, 배경을 구분하며, 그림의 감성을 강화하는 역할을 동시에 수행하면서 각각의 요소를 하나의 통합된 이미지로 묶는다. 따라서 이러한 사례에서 분홍은 브랜드 이미지 구축, 감성 전달, 시선 유도, 소비자층 암시, 그리고 1990년대 후반 디자인 트렌드를 드러내는 핵심 시각 언어로 기능하고 있다고 볼 수 있다.
		</p>
</body>
</html>
