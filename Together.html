<!DOCTYPE html>
<html lang="ko"> 
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>글, 배경, 그림이 합쳐져 쓰인 분홍의 요소</title>
	<meta name="description" content="글, 배경, 그림이 합쳐져 쓰인 분홍색의 요소를 모아놓은 웹사이트입니다.">
	<meta name="keywords" content="글, 글자, 배경, 그림, 분홍, 분홍색, 1997년, 월간디자인, 잡지">
	<link rel="stylesheet" href="style.css">
</head>
<body class="Together">
	<h1 class="Title4">글, 배경, 그림이 합쳐져 쓰인 분홍의 요소</h1>
		<ul>
			<img  class="T1" src="T1.jpeg" alt="분홍색 바탕에 '칩칩스타'라는 오리 캐릭커가 두 발로 서서 뒷짐지고 웃고있다. 머리와 신발에 꽃잎이 다섯개인 꽃 장식이 달려있고 캐릭터의 옆에도 꽃들이 흩날리고 있다. 배경은 분홍색이고, 그 위에 '칩칩스타'라는 글자가 영어로 적혀있다. '칩칩'은 분홍색, '스타'는 연두색으로 되어있다.">

			<img class="T2" src="T2.jpeg" alt="분홍 바탕에 '광고의 키워드'라는 글이 적혀있는 책을 소개하는 이미지이다.">

			<img class="T3" src="T3.jpeg" alt="분홍 바탕에 'fantasy'라는 글이 적혀있고, 여성 모델이 쳐다보는 광고 이미지이다.">

			<img class="T4" src="T4.jpeg" alt="미미월드의 광고지면이다. 분홍색 바탕에 '어린시절 꿈을 펼쳐갈 디자이너를 모집합니다.'라는 글이 써있는 이미지이다.">

			<img class="T5" src="T5.jpeg" alt="한국에서 자주 쓰는 색들을 알려주는 이미지이고, 맨 밑에 분홍색의 이미지가 있다.">

			<img class="T6" src="T6.jpeg" alt="분홍색 배경에 '감성교육'이라는 글이 적혀있는 이미지이다.">

			<img class="T7" src="T7.jpeg" alt="상단에 분홍색 선이 있고, 일러스트가 있으며 '놀면서 일한다?!!'라는 글이 적혀있는 이미지이다.">
		</ul>
		<p class="title6">글, 배경, 그림이 함께 사용된 광고 속 분홍은 특정 요소를 강조하기 위한 색을 넘어 광고 전체의 분위기와 정체성을 형성하는 중심 색채로 사용되고 있다. 분홍 글자를 강조하고, 배경을 구분하며, 그림의 감성을 강화하는 역할을 동시에 수행하면서 각각의 요소를 하나의 통합된 이미지로 묶는다. 따라서 이러한 사례에서 분홍 브랜드 이미지 구축, 감성 전달, 시선 유도, 소비자층 암시, 그리고 1990년대 후반 디자인 트렌드를 드러내는 핵심 시각 언어로 기능하고 있다고 볼 수 있다.
		</p>
</body>
</html>
