<!DOCTYPE html>
<html lang="ko"> 
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>배경에 쓰인 분홍의 요소</title>
	<meta name="description" content="배경에 쓰인 분홍색의 요소를 모아놓은 웹사이트입니다.">
	<meta name="keywords" content="배경, 1997년, 월간디자인, 잡지, 분홍, 분홍색">
	<link rel="stylesheet" href="style.css">
</head>
<body class="Background">
	<h1 class="Title2">배경에 쓰인 분홍의 요소</h1>
		<ul>
			<img  class="B1" src="B1.jpeg" alt="분홍 바탕에 '가구연구소 요원모집'라는 글이 적혀있는 이미지이다.">

			<img class="B2" src="B2.jpeg" alt="분홍 바탕에 '잔잔한 전통적스타일의 발무늬'라는 글이 적혀있는 이미지이다.">

			<img class="B3" src="B3.jpeg" alt="분홍 바탕에 '이보다 더 강력한 마이크로 오디오는 없다!'라는 분홍색 글이 적혀있는 이미지이다.">

			<img class="B4" src="B4.jpeg" alt="맥, 윈도용 4.0출시라는 검은색 글이 써져있고 분홍색 바탕에 노란색 테두리인 뾰족한 톱니 모양인 이미지이다.">

			<img class="B5" src="B5.jpeg" alt="분홍 바탕에 '미대편입을 위한 특별한 선택...이즈'라는 흰 글이 적혀있는 이미지이다.">

			<img class="B6" src="B6.jpeg" alt="분홍색 배경에 '새색시 밥상처럼 정갈한 뉴스, 앵커 전용학이 알려드립니다.'라는 글이 적혀있는 이미지이다.">

			<img class="B7" src="B7.jpeg" alt="분홍색 배경에 '감사합니다.'라는 글이 적혀있는 이미지이다.">

			<img class="B8" src="B8.jpeg" alt="분홍 배경에 '경력 및 간부사원 모집'이라는 흰 글이 적혀있는 이미지이다.">
		</ul>
		<p class="title4">분홍 배경은 단순한 장식 요소가 아니라 광고의 주목도를 높이고, 정보를 구분하며, 브랜드 이미지를 형성하고, 미래적이고 감각적인 분위기를 만드는 시각적 장치로 활용되었다. 특히 글자에 사용된 분홍이 메시지 자체를 강조하는 역할을 했다면, 배경에 사용된 분홍은 정보를 담는 공간을 구획하고 광고 전체의 분위기와 시선의 흐름을 설계하는 역할을 수행한다 이를 통해 당시 한국 디자인이 강렬한 색면과 높은 채도의 컬러를 적극 활용하여 시각적 임팩트를 추구했음을 확인할 수 있다.
		</p>
</body>
</html>
